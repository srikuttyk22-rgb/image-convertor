<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SriKutty Image Converter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>🔥 Image Converter Pro</h1>

    <div id="dropArea">
        <p>Drag & Drop Image or Click</p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <img id="preview" />

    <select id="format">
        <option value="image/png">PNG</option>
        <option value="image/jpeg">JPG</option>
        <option value="image/webp">WEBP</option>
    </select>

    <br>

    <label>Resize Width:</label>
    <input type="number" id="width" placeholder="Auto">

    <label>Quality (0.1 - 1):</label>
    <input type="range" id="quality" min="0.1" max="1" step="0.1" value="1">

    <br>

    <button onclick="convert()">Convert</button>

    <a id="download">Download</a>
</div>

<script src="script.js"></script>
</body>
</html>
